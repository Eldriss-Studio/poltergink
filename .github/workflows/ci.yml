name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json's "packageManager" field —
      # do not duplicate it here or the action errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm verify

  # attw runs only on Node 20 — the current Node 22 + attw combination has an
  # upstream incompatibility that throws on every package. Revisit when attw
  # ships a Node 22 fix.
  attw:
    name: attw (publish validation)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from package.json's "packageManager" field —
      # do not duplicate it here or the action errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm attw
