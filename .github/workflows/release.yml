name: Release

# Muted at v0.0.0 — the package is marked `"private": true` and there is
# nothing to publish to npm yet. The workflow stays in the repo, fully
# configured, so it can be re-enabled in one diff when v0.1.0 is ready.
#
# To revive auto-release on push to main:
#   1. Change the trigger below from `workflow_dispatch:` back to
#        push:
#          branches: [main]
#   2. Flip `"private": true` → remove (or set to `false`) in package.json.
#   3. EITHER enable "Allow GitHub Actions to create and approve pull
#      requests" at the org/repo level, OR swap secrets.GITHUB_TOKEN for
#      a fine-grained PAT (Contents: rw, Pull requests: rw) under a new
#      secret name like RELEASE_TOKEN.
#   4. If publishing to npm, set up trusted publishing (recommended) at
#      https://docs.npmjs.com/trusted-publishers OR add an NPM_TOKEN
#      repo secret.
#
# Until then, this workflow only runs when manually dispatched from the
# Actions tab — so it doesn't redden CI on every push.
on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # pnpm version comes from package.json's "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          # Match commitlint's gitmoji format (see commitlint.config.js).
          title: "🔖 release: version packages"
          commit: "🔖 release: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
